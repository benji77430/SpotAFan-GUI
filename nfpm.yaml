name: "spotafan"
arch: "amd64"       # Note: Use 'amd64' here (Go nomenclature). nfpm translates it to x86_64 for Arch!
platform: "linux"
version: "1.0.0"
release: "1"
section: "sound"
maintainer: "Your Name <you@example.com>"
description: "SpotAFan Python Qt App"
license: "Unlicense"

contents:
  - src: "dist/SpotAFan"
    dst: "/usr/bin/SpotAFan"
  - src: "assets/SpotAFan.desktop"
    dst: "/usr/share/applications/SpotAFan.desktop"
  - src: "assets/logo.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/SpotAFan.png"
